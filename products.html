<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css"> <!-- Global CSS -->
</head>
<body>
    <!-- Navbar will be inserted here -->
  <div id="navbar-container"></div>
  <div class="container section text-center">
    <h1 class="fw-bold mb-4">Our Products</h1>
    <p class="mb-5">Cutting-edge software & AI platforms built for the future</p>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="product-card">
          <h3>AI Chatbot Platform</h3>
          <p>Seamless customer support powered by NLP & machine learning.</p>
        </div>
      </div>
      <div class="col-md-6">
        <div class="product-card">
          <h3>Automation Suite</h3>
          <p>Automating workflows and reducing manual effort by 60%.</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer -->
    <!-- Footer will be dynamically inserted here -->
    <div id="footer-container"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
<!-- Bootstrap JS (with Popper.js included) -->

</html>

<script>
    // Fetch and insert the navbar
    fetch('navbar.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('navbar-container').innerHTML = data;
        })
        .catch(error => {
            console.error('Error loading navbar:', error);
        });
  // Dynamically load the footer from footer.html
    fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            })
            .catch(error => {
                console.error('Error loading footer:', error);
            });
</script>
