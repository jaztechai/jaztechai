<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Registration Form</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Custom Styles */
    body {
      background: black;
      font-family: 'Roboto', sans-serif;
    }

    .form-containers {
      background: whitesmoke;
      padding: 30px;
      margin-top: 7%;
      margin-bottom: 7%;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .form-containers h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-containers .form-control {
      border-radius: 20px;
      margin-bottom: 15px;
    }

    .btn-custom {
      background-color: #007bff;
      color: #fff;
      border-radius: 20px;
      font-weight: 500;
      width: 100%;
    }

    .btn-custom:hover {
      background-color: #0056b3;
    }

    .form-text {
      font-size: 0.9rem;
      color: #777;
    }

    .alert-custom {
      display: none;
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
    }

    .form-footer a {
      text-decoration: none;
      color: #007bff;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
   <!-- Navbar will be inserted here -->
  <div id="navbar-container"></div>
   

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="form-containers col-lg-6 col-md-8 col-sm-10">
      <h2>Sign Up</h2>

      <!-- Error/Success message -->
      <div id="responseMessage" class="alert alert-dismissible fade show alert-custom" role="alert">
        <strong>Success!</strong> Your registration was successful.
      </div>

      <form id="registration-form" action="https://formspree.io/f/xkggpral" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
          <div class="form-text">We’ll never share your email with anyone else.</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn btn-custom">Sign Up</button>

        <div class="form-footer">
          <p class="mt-3">Already have an account? <a href="#">Login</a></p>
        </div>
      </form>
    </div>
  </div>
  <!-- Footer -->
    <!-- Footer -->
    <!-- Footer will be dynamically inserted here -->
    <div id="footer-container"></div>


  <!-- Bootstrap 5 JS and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>



</body>

</html>
  <script>
// Fetch and insert the navbar
fetch('navbar.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('navbar-container').innerHTML = data;
    })
    .catch(error => {
        console.error('Error loading navbar:', error);
    });


    // Dynamically load the footer from footer.html
    fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-container').innerHTML = data;
            })
            .catch(error => {
                console.error('Error loading footer:', error);
            });
</script>
